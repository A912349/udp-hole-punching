name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Install UPX (fast)
        run: |
          curl -L -o upx.tar.xz https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-amd64_linux.tar.xz
          tar -xf upx.tar.xz
          sudo mv upx-*/upx /usr/local/bin/
          upx --version

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build server
        run: |
          CGO_ENABLED=0 \
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -buildid=" \
            -o bin/server \
            ./cmd/server

      - name: Build server (linux arm64)
        run: |
          CGO_ENABLED=0 \
          GOOS=linux \
          GOARCH=arm64 \
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -buildid=" \
            -o bin/server-linux-arm64 \
            ./cmd/server

      - name: Build mesh-node (linux amd64)
        run: |
          CGO_ENABLED=0 \
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -buildid=" \
            -o bin/mesh-node \
            ./cmd/mesh-node

      - name: Build mesh-node (linux arm64)
        run: |
          CGO_ENABLED=0 \
          GOOS=linux \
          GOARCH=arm64 \
          go build \
            -trimpath \
            -buildvcs=false \
            -ldflags="-s -w -buildid=" \
            -o bin/mesh-node-linux-arm64 \
            ./cmd/mesh-node

      - name: Compress binaries
        run: |
          upx --best --lzma bin/server
          upx --best --lzma bin/server-linux-arm64
          upx --best --lzma bin/mesh-node
          upx --best --lzma bin/mesh-node-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/*
          compression-level: 0
          retention-days: 30

  windows-client:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Test Windows client
        run: go test ./cmd/mesh-node ./internal/protocol

      - name: Build Windows client
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force bin | Out-Null
          $env:CGO_ENABLED = '0'
          go build -trimpath -buildvcs=false -ldflags='-s -w -buildid=' -o bin/mesh-node.exe ./cmd/mesh-node

      - name: Bundle official Wintun runtime
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'wintun.zip'
          Invoke-WebRequest -Uri 'https://www.wintun.net/builds/wintun-0.14.1.zip' -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath (Join-Path $env:RUNNER_TEMP 'wintun') -Force
          Copy-Item (Join-Path $env:RUNNER_TEMP 'wintun\wintun\bin\amd64\wintun.dll') bin\wintun.dll

      - name: Upload Windows client
        uses: actions/upload-artifact@v4
        with:
          name: windows-client
          path: bin/*
          compression-level: 0
          retention-days: 30