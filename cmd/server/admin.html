<!doctype html><meta charset="utf-8"><title>Mesh Admin</title>
<style>body{max-width:900px;margin:2rem auto;font:16px sans-serif}input,button,textarea,select{margin:.3rem;padding:.4rem}textarea{width:100%}code{font-weight:bold}</style>
<h1>Mesh administration</h1><input id="token" type="password" placeholder="Network token"><button onclick="load()">Connect</button><p id="status"></p>
<h2>Topology settings</h2><form id="settings"><input name="node_ttl_seconds" placeholder="TTL"><input name="auto_superpeers" placeholder="Auto superpeers"><input name="backbone_degree" placeholder="Backbone degree"><input name="client_links" placeholder="Client links"><input name="symmetric_links" placeholder="Symmetric links"><button>Apply</button></form>
<h2>Invite</h2><button onclick="invite()">Create invite (30 sec)</button> <code id="invite"></code>
<h2>Manual graph</h2><p>One edge per line: <code>NODE_ID_A NODE_ID_B COST</code>. Empty list restores automatic graph.</p><textarea id="graph" rows="8"></textarea><button onclick="graphLoad()">Load</button><button onclick="graphSave()">Save graph</button>
<h2>Devices</h2><select id="devices"></select><button onclick="removeDevice()">Remove selected</button><pre id="nodes"></pre>
<script>const $=x=>document.getElementById(x),api=async(p,o={})=>{o.headers={...(o.headers||{}),'X-Mesh-Token':$('token').value};let r=await fetch(p,o),x=await r.json();if(!r.ok)throw Error(x.error||r.status);return x};async function load(){try{let[c,t]=await Promise.all([api('/v1/admin/config'),api('/v1/admin/topology')]);for(let k in c)$('settings').elements[k].value=c[k];let n=t.nodes||[];$('devices').innerHTML=n.map(x=>'<option value="'+x.node_id+'">'+x.node_id.slice(0,12)+' '+x.role+' '+x.mesh_ip+'</option>').join('');$('nodes').textContent=JSON.stringify({nodes:n,links:t.links||[]},null,2);$('status').textContent='Updated'}catch(e){$('status').textContent='Error: '+e.message}}$('settings').onsubmit=async e=>{e.preventDefault();let o={};for(let x of new FormData(e.target))o[x[0]]=+x[1];try{await api('/v1/admin/config',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(o)});load()}catch(e){$('status').textContent=e.message}};async function invite(){let x=await api('/v1/admin/invites',{method:'POST'});$('invite').textContent=x.invite_token}async function graphLoad(){let x=await api('/v1/admin/graph');$('graph').value=(x.links||[]).map(e=>e.a+' '+e.b+' '+e.cost).join('\n')}async function graphSave(){let v=$('graph').value.trim(),links=v?v.split(/\n+/).map(x=>{let p=x.trim().split(/\s+/);return{a:p[0],b:p[1],cost:+p[2]}}):[];await api('/v1/admin/graph',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({links})});load()}async function removeDevice(){let id=$('devices').value;if(id){await api('/v1/admin/nodes/'+id,{method:'DELETE'});load()}}</script>
